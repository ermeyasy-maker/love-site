<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>You have 1 message</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,600;0,700;1,300;1,600&family=Space+Mono:wght@400;700&display=swap');

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --pink:#ff2d78;
  --hot:#ff006e;
  --purple:#7b2fff;
  --cyan:#00f5ff;
  --gold:#ffd700;
  --bg:#03000a;
}

html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);cursor:none}

/* ====== CUSTOM CURSOR ====== */
#cursor{
  position:fixed;width:14px;height:14px;
  background:var(--pink);border-radius:50%;
  pointer-events:none;z-index:99999;
  mix-blend-mode:screen;
  transition:transform 0.08s ease, width 0.15s ease, height 0.15s ease, background 0.2s ease;
  transform:translate(-50%,-50%);
  box-shadow:0 0 10px var(--pink),0 0 30px var(--pink);
}
#cursor-ring{
  position:fixed;width:36px;height:36px;
  border:1.5px solid rgba(255,45,120,0.6);
  border-radius:50%;pointer-events:none;z-index:99998;
  transform:translate(-50%,-50%);
  transition:left 0.12s ease,top 0.12s ease,width 0.2s,height 0.2s,border-color 0.2s;
}
.cursor-trail{
  position:fixed;width:6px;height:6px;
  border-radius:50%;pointer-events:none;
  z-index:99990;opacity:0.8;
  mix-blend-mode:screen;
  animation:trailFade 0.5s ease forwards;
}
@keyframes trailFade{to{opacity:0;transform:scale(0)}}

#universe{position:fixed;inset:0;z-index:0}

#grain{
  position:fixed;inset:0;z-index:1;
  opacity:0.04;pointer-events:none;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-size:100px 100px;
  animation:noiseShift 0.15s steps(1) infinite;
}
@keyframes noiseShift{
  0%{background-position:0 0}20%{background-position:-10px 20px}
  40%{background-position:15px -5px}60%{background-position:-20px 10px}
  80%{background-position:5px -15px}100%{background-position:-8px 8px}
}

#flash{position:fixed;inset:0;z-index:9999;pointer-events:none;opacity:0;background:white}

#scanlines{
  position:fixed;inset:0;z-index:2;pointer-events:none;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.12) 2px,rgba(0,0,0,0.12) 4px);
  animation:scanMove 8s linear infinite;
}
@keyframes scanMove{to{background-position:0 100px}}

#vignette{
  position:fixed;inset:0;z-index:3;pointer-events:none;
  background:radial-gradient(ellipse at center,transparent 40%,rgba(3,0,10,0.85) 100%);
}

.glitch-layer{position:fixed;inset:0;z-index:4;pointer-events:none;opacity:0;animation:glitchIdle 7s infinite;}
.glitch-layer::before,.glitch-layer::after{content:'';position:absolute;inset:0;background:inherit;mix-blend-mode:screen;}
.glitch-layer::before{background:rgba(255,45,120,0.06);clip-path:polygon(0 20%,100% 20%,100% 25%,0 25%);animation:glitchSlice1 7s infinite;}
.glitch-layer::after{background:rgba(0,245,255,0.06);clip-path:polygon(0 60%,100% 60%,100% 63%,0 63%);animation:glitchSlice2 7s infinite;}
@keyframes glitchIdle{0%,89%,100%{opacity:0}90%{opacity:1}}
@keyframes glitchSlice1{
  0%,89%{clip-path:polygon(0 0,0 0,0 0,0 0)}
  90%{clip-path:polygon(0 20%,100% 20%,100% 25%,0 25%);transform:translate(-4px,0)}
  92%{clip-path:polygon(0 40%,100% 40%,100% 43%,0 43%);transform:translate(4px,0)}
  94%{clip-path:polygon(0 0,0 0,0 0,0 0)}
}
@keyframes glitchSlice2{
  0%,89%{clip-path:polygon(0 0,0 0,0 0,0 0)}
  91%{clip-path:polygon(0 60%,100% 60%,100% 63%,0 63%);transform:translate(3px,0)}
  93%{clip-path:polygon(0 75%,100% 75%,100% 78%,0 78%);transform:translate(-3px,0)}
  95%{clip-path:polygon(0 0,0 0,0 0,0 0)}
}

.heart-float{position:fixed;pointer-events:none;z-index:5;color:var(--pink);animation:heartRise linear forwards;}
@keyframes heartRise{
  0%{opacity:1;transform:translateY(0) rotate(-8deg) scale(1)}
  100%{opacity:0;transform:translateY(-110vh) rotate(8deg) scale(0.6)}
}

/* ====== NOTIFICATION ====== */
#notif{position:fixed;inset:0;z-index:1000;display:flex;justify-content:center;align-items:center;background:var(--bg);}
#notif-inner{position:relative;display:flex;flex-direction:column;align-items:center;gap:28px;}

.orbit-ring{position:absolute;border-radius:50%;border:1px solid transparent;animation:spinOrbit linear infinite;}
.orbit-ring::before{content:'';position:absolute;width:8px;height:8px;background:var(--pink);border-radius:50%;box-shadow:0 0 12px var(--pink),0 0 24px var(--pink);top:50%;left:-4px;transform:translateY(-50%);}
@keyframes spinOrbit{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}

#envelope-wrapper{width:120px;height:120px;position:relative;display:flex;align-items:center;justify-content:center;}
.orbit-ring:nth-child(1){width:160px;height:160px;top:calc(50% - 80px);left:calc(50% - 80px);animation-duration:3s;border-top-color:var(--pink);border-right-color:rgba(255,45,120,0.2)}
.orbit-ring:nth-child(2){width:200px;height:200px;top:calc(50% - 100px);left:calc(50% - 100px);animation-duration:5s;animation-direction:reverse;border-bottom-color:var(--cyan);border-left-color:rgba(0,245,255,0.2)}
.orbit-ring:nth-child(3){width:240px;height:240px;top:calc(50% - 120px);left:calc(50% - 120px);animation-duration:8s;border-top-color:var(--purple);border-right-color:rgba(123,47,255,0.2)}
.orbit-ring:nth-child(3)::before{background:var(--purple);box-shadow:0 0 12px var(--purple)}
.orbit-ring:nth-child(2)::before{background:var(--cyan);box-shadow:0 0 12px var(--cyan)}

.env-svg{width:70px;height:70px;filter:drop-shadow(0 0 20px var(--pink)) drop-shadow(0 0 40px rgba(255,45,120,0.4));animation:envPulse 2s ease-in-out infinite;}
@keyframes envPulse{
  0%,100%{filter:drop-shadow(0 0 20px var(--pink)) drop-shadow(0 0 40px rgba(255,45,120,0.4))}
  50%{filter:drop-shadow(0 0 35px var(--pink)) drop-shadow(0 0 70px rgba(255,45,120,0.8))}
}

#notif-dot{width:10px;height:10px;background:var(--pink);border-radius:50%;display:inline-block;margin-right:8px;animation:dotPulse 1s infinite;}
@keyframes dotPulse{0%,100%{box-shadow:0 0 0 0 rgba(255,45,120,0.8)}50%{box-shadow:0 0 0 8px rgba(255,45,120,0)}}

#notif-btn{
  background:transparent;border:1px solid rgba(255,45,120,0.4);
  padding:16px 40px;border-radius:100px;font-family:'Space Mono',monospace;
  font-size:0.9em;color:rgba(255,255,255,0.9);letter-spacing:0.15em;
  text-transform:uppercase;cursor:none;position:relative;overflow:hidden;
  transition:border-color 0.3s,box-shadow 0.3s;box-shadow:0 0 20px rgba(255,45,120,0.2);
}
#notif-btn::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,45,120,0.12),rgba(123,47,255,0.12));transform:translateX(-100%);transition:transform 0.4s ease;}
#notif-btn:hover::before{transform:translateX(0)}
#notif-btn:hover{border-color:rgba(255,45,120,0.9);box-shadow:0 0 40px rgba(255,45,120,0.5),inset 0 0 20px rgba(255,45,120,0.08);}

.notif-sub{font-family:'Space Mono',monospace;font-size:0.65em;color:rgba(255,255,255,0.25);letter-spacing:0.3em;text-transform:uppercase;animation:subtleFade 2s ease-in-out infinite alternate;}
@keyframes subtleFade{from{opacity:0.3}to{opacity:0.8}}

/* ====== INTRO ====== */
#intro{position:fixed;inset:0;z-index:800;display:none;justify-content:center;align-items:center;flex-direction:column;gap:12px;background:var(--bg);}
.intro-line{font-family:'Cormorant Garamond',serif;font-style:italic;font-weight:300;font-size:clamp(1.4em,5vw,2.8em);color:white;opacity:0;transform:translateY(30px);animation:introReveal 0.8s ease forwards;}
@keyframes introReveal{to{opacity:1;transform:translateY(0)}}

/* ====== APP ====== */
#app{
  position:fixed;inset:0;z-index:100;display:none;
  justify-content:center;align-items:center;flex-direction:column;
  padding:20px;overflow-y:auto;
}

   

#bg {
    position: fixed;
    inset: 0;
    overflow: hidden;
    z-index: -3;
    transition: transform 0.1s ease-out;
  }

/* ====== PHOTO WRAP — no frame, natural ratio ====== */
#polaroid-wrap{
  position:relative;
  animation:polaroidDrop 0.7s cubic-bezier(0.34,1.56,0.64,1) forwards;
  /* max width so it doesn't overflow on small screens */
  max-width:min(400px,82vw);
  width:min(400px,82vw);
}
@keyframes polaroidDrop{
  from{opacity:0;transform:translateY(-80px) rotate(-8deg) scale(0.8)}
  to{opacity:1}
}

/* Photo itself — natural aspect ratio */
 #photo {
    max-width: 80%;
    max-height: 60vh;
    border-radius: 30px;
    box-shadow: 0 0 30px rgba(255,77,166,0.6), 0 20px 60px rgba(0,0,0,0.6);
    object-fit: contain;
    opacity: 0;
    transition: opacity 0.6s ease;
  }

/* ====== TEXT ====== */
#text-wrap{margin-top:22px;text-align:center;max-width:520px;padding:0 20px}
#text{
  font-family:'Cormorant Garamond',serif;
  font-style:italic;font-weight:300;
  font-size:clamp(1.1em,3vw,1.45em);
  color:rgba(255,255,255,0.92);
  line-height:1.8;min-height:3em;
}
#cursor-blink{
  display:inline-block;width:2px;height:1.1em;
  background:var(--pink);margin-left:2px;vertical-align:middle;
  animation:blink 0.8s step-end infinite;
}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}

/* ====== PROGRESS ====== */
#progress-wrap{margin-top:18px;display:flex;align-items:center;gap:14px;}
#progress-bar{width:min(240px,50vw);height:3px;background:rgba(255,255,255,0.08);border-radius:10px;overflow:hidden;}
#progress-fill{
  height:100%;width:0%;
  background:linear-gradient(90deg,var(--pink),var(--purple),var(--cyan));
  background-size:200% 100%;
  animation:gradientShift 3s linear infinite;
  border-radius:10px;
  transition:width 0.5s cubic-bezier(0.22,1,0.36,1);
  box-shadow:0 0 8px var(--pink);
}
@keyframes gradientShift{0%{background-position:0% 50%}100%{background-position:200% 50%}}
#progress-num{font-family:'Space Mono',monospace;font-size:0.7em;color:rgba(255,255,255,0.3);letter-spacing:0.15em;white-space:nowrap;}

/* ====== NEXT BUTTON ====== */
#nextBtn{margin-top:22px;background:transparent;border:none;padding:0;cursor:none;position:relative;}
.next-btn-inner{
  display:flex;align-items:center;gap:10px;
  font-family:'Space Mono',monospace;font-size:0.78em;letter-spacing:0.18em;
  text-transform:uppercase;color:rgba(255,255,255,0.5);
  transition:color 0.3s;padding:10px 0;position:relative;
}
.next-btn-inner::after{
  content:'';position:absolute;bottom:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,var(--pink),transparent);
  transform:scaleX(0);transition:transform 0.4s ease;
}
#nextBtn:hover .next-btn-inner{color:rgba(255,255,255,0.9)}
#nextBtn:hover .next-btn-inner::after{transform:scaleX(1)}
.next-arrow{width:28px;height:1px;background:currentColor;position:relative;transition:width 0.3s ease;}
.next-arrow::after{content:'';position:absolute;right:-1px;top:-4px;width:8px;height:8px;border-right:1px solid currentColor;border-top:1px solid currentColor;transform:rotate(45deg);}
#nextBtn:hover .next-arrow{width:42px}

/* ====== PREVIOUS BUTTON ====== */
#prevBtn {
  margin-top: 22px;
  background: transparent;
  border: none;
  padding: 0;
  cursor: none;
  position: relative;
}

.prev-btn-inner {
  display: flex;
  flex-direction: row-reverse; /* Reverses order of arrow and text */
  align-items: center;
  gap: 10px;
  font-family: 'Space Mono', monospace;
  font-size: 0.78em;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: rgba(255, 255, 255, 0.5);
  transition: color 0.3s;
  padding: 10px 0;
  position: relative;
}

.prev-btn-inner::after {
  content: '';
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--pink), transparent);
  transform: scaleX(0);
  transition: transform 0.4s ease;
}

#prevBtn:hover .prev-btn-inner { color: rgba(255, 255, 255, 0.9); }
#prevBtn:hover .prev-btn-inner::after { transform: scaleX(1); }

.prev-arrow {
  width: 28px;
  height: 1px;
  background: currentColor;
  position: relative;
  transition: width 0.3s ease;
}

/* Flipped arrow head for "Previous" */
.prev-arrow::after {
  content: '';
  position: absolute;
  left: -1px; /* Attached to the left */
  top: -4px;
  width: 8px;
  height: 8px;
  border-left: 1px solid currentColor;
  border-top: 1px solid currentColor;
  transform: rotate(-45deg);
}

#prevBtn:hover .prev-arrow { width: 42px; }


/* ====== FINAL ====== */
#final{display:none;flex-direction:column;align-items:center;text-align:center;animation:fadeUp 1s ease forwards;}
#final-title{font-family:'Cormorant Garamond',serif;font-weight:600;font-size:clamp(1.6em,5vw,2.4em);color:white;line-height:1.3;margin-bottom:10px;}
#final-sub{font-family:'Space Mono',monospace;font-size:0.7em;color:rgba(255,255,255,0.3);letter-spacing:0.2em;text-transform:uppercase;margin-bottom:32px;}
#final-btns{display:flex;gap:16px;flex-wrap:wrap;justify-content:center}

#yesBtn{
  font-family:'Space Mono',monospace;font-size:0.85em;letter-spacing:0.15em;text-transform:uppercase;
  color:white;border:none;cursor:none;padding:16px 44px;border-radius:100px;
  position:relative;overflow:hidden;
  background:linear-gradient(135deg,var(--hot),var(--purple));
  box-shadow:0 0 30px rgba(255,0,110,0.5);
  transition:transform 0.25s cubic-bezier(0.34,1.56,0.64,1),box-shadow 0.25s;
}
#yesBtn:hover{transform:scale(1.1);box-shadow:0 0 60px rgba(255,0,110,0.8),0 0 100px rgba(255,0,110,0.3);}

#noBtn{
  font-family:'Space Mono',monospace;font-size:0.85em;letter-spacing:0.15em;text-transform:uppercase;
  color:rgba(255,255,255,0.4);border:1px solid rgba(255,255,255,0.15);
  background:transparent;cursor:none;padding:16px 44px;border-radius:100px;
  position:relative;transition:transform 0.5s cubic-bezier(0.34,1.56,0.64,1),opacity 0.5s,font-size 0.4s;
}

/* ====== YES SCREEN ====== */
#yes-screen{position:fixed;inset:0;z-index:900;display:none;justify-content:center;align-items:center;flex-direction:column;text-align:center;padding:30px;}
#yes-halo{position:fixed;inset:0;pointer-events:none;z-index:0;background:radial-gradient(ellipse at 50% 50%,rgba(255,45,120,0.25) 0%,transparent 70%);animation:haloBreath 2s ease-in-out infinite alternate;}
@keyframes haloBreath{from{opacity:0.6}to{opacity:1}}

#yes-ring-svg{width:100px;height:100px;animation:popIn 1.2s cubic-bezier(0.34,1.56,0.64,1) forwards;opacity:0;filter:drop-shadow(0 0 20px var(--gold)) drop-shadow(0 0 50px rgba(255,215,0,0.5));position:relative;z-index:1;margin-bottom:20px;}
@keyframes popIn{from{opacity:0;transform:scale(0) rotate(-180deg)}to{opacity:1;transform:scale(1) rotate(0deg)}}

#yes-h1{
  font-family:'Cormorant Garamond',serif;font-weight:600;font-style:italic;
  font-size:clamp(3em,12vw,7em);
  background:linear-gradient(135deg,var(--pink),var(--gold),var(--cyan),var(--purple),var(--pink));
  background-size:300% 300%;
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  animation:gradientText 3s ease infinite;position:relative;z-index:1;line-height:1;
}
@keyframes gradientText{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}

#yes-amharic{font-family:'Cormorant Garamond',serif;font-weight:300;font-size:clamp(1em,3.5vw,1.6em);color:rgba(255,255,255,0.9);margin-top:14px;position:relative;z-index:1;line-height:1.7;}
#yes-sub{font-family:'Space Mono',monospace;font-size:0.7em;color:rgba(255,255,255,0.35);letter-spacing:0.2em;text-transform:uppercase;margin-top:18px;position:relative;z-index:1;}

.spark-dot{position:fixed;border-radius:50%;pointer-events:none;z-index:9000;animation:sparkFly 1.4s ease forwards;}
@keyframes sparkFly{0%{opacity:1;transform:scale(1)}100%{opacity:0;transform:var(--tx) scale(0)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(40px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>  
<canvas id="universe"></canvas>
<div id="grain"></div>
<div id="scanlines"></div>
<div id="vignette"></div>
<div class="glitch-layer"></div>
<div id="flash"></div>
<div id="cursor"></div>
<div id="cursor-ring"></div>

<audio id="music" loop>
  <source src="አብነት_አጎናፍር_እወድሻለው_Abinet_Agonafir_Ewedishalew256k.mp3">
</audio>

<!-- NOTIFICATION -->
<div id="notif">
  <div id="notif-inner">
    <div id="envelope-wrapper">
      <div class="orbit-ring"></div>
      <div class="orbit-ring"></div>
      <div class="orbit-ring"></div>
      <svg class="env-svg" viewBox="0 0 64 64" fill="none">
        <rect x="4" y="12" width="56" height="40" rx="4" fill="none" stroke="#ff2d78" stroke-width="2"/>
        <polyline points="4,12 32,36 60,12" fill="none" stroke="#ff2d78" stroke-width="2"/>
        <circle cx="50" cy="18" r="8" fill="#ff2d78"/>
        <text x="50" y="22" text-anchor="middle" fill="white" font-size="10" font-family="monospace" font-weight="bold">1</text>
      </svg>
    </div>
    <button id="notif-btn" onclick="openApp()">
      <span id="notif-dot"></span> You have 1 new message
    </button>
    <div class="notif-sub">tap to open</div>
  </div>
</div>

<!-- INTRO -->
<div id="intro">
  <div class="intro-line" style="animation-delay:0.1s">For</div>
  <div class="intro-line" style="animation-delay:0.5s; color:var(--pink); font-size:1.4em;">You</div>
  <div class="intro-line" style="animation-delay:1s; font-size:0.6em; letter-spacing:0.4em; font-style:normal; color:rgba(255,255,255,0.3); font-family:'Space Mono',monospace; text-transform:uppercase;">always &amp; forever</div>
</div>

<!-- APP -->
<div id="app">
  <div id="photo-bg"></div>

  <!-- No frame decorators — just the wrap and photo -->
  <div id="polaroid-wrap">
    <img id="photo" alt="memory">
  </div>

  <div id="text-wrap">
    <div id="text"><span id="cursor-blink"></span></div>
  </div>

  <div id="progress-wrap">
    <div id="progress-bar"><div id="progress-fill"></div></div>
    <div id="progress-num">01 / 27</div>
  </div>

 <div style="display:flex; gap:20px; align-items:center; margin-top:22px;">

  <!-- PREVIOUS BUTTON -->
  <button id="prevBtn" onclick="prevMemory()">
    <div class="next-btn-inner">
      <div class="next-arrow" style="transform:rotate(180deg)"></div>
      <span>Previous</span>
    </div>
  </button>

  <!-- NEXT BUTTON -->
  <button id="nextBtn" onclick="nextMemory()">
    <div class="next-btn-inner">
      <span>Next memory</span>
      <div class="next-arrow"></div>
    </div>
  </button>

</div>

  <div id="final">
    <div id="final-title">Will you be mine forever?</div>
    <div id="final-sub">choose carefully</div>
    <div id="final-btns">
      <button id="yesBtn" onclick="yes()">Yes</button>
      <button id="noBtn"
        onmouseover="moveNoBtn(this)"
        ontouchstart="moveNoBtn(this)">No</button>
    </div>
  </div>
</div>

<!-- YES SCREEN -->
<div id="yes-screen">
  <div id="yes-halo"></div>
  <svg id="yes-ring-svg" viewBox="0 0 100 100">
    <circle cx="50" cy="50" r="35" fill="none" stroke="#ffd700" stroke-width="4"/>
    <circle cx="50" cy="50" r="35" fill="none" stroke="url(#rg)" stroke-width="4"
      stroke-dasharray="50 170" stroke-dashoffset="0" stroke-linecap="round">
      <animateTransform attributeName="transform" type="rotate"
        from="0 50 50" to="360 50 50" dur="4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="50" cy="50" r="14" fill="#ffd700" opacity="0.15"/>
    <text x="50" y="56" text-anchor="middle" fill="#ffd700" font-size="18">*</text>
    <defs>
      <linearGradient id="rg" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#ff2d78"/>
        <stop offset="100%" stop-color="#ffd700"/>
      </linearGradient>
    </defs>
  </svg>
  <div id="yes-h1">YES!</div>
  <div id="yes-amharic">
    እሙዬ የኔ ሚስት<br>አፈቅርሻለሁ!
  </div>
  <div id="yes-sub">እግዚአብሔር ረጅም ዕድሜ ከጤና ጋር ይስጥሽ</div>
</div>

<script>
"use strict";

const memories = [
  {img:"a (27).jpg",  text:"አንቺን ያወኩሽ ቀን... ሁሉም ነገር ተቀየረ"},
  {img:"a (2).png",   text:"ሰው በሞላበት ዓለም የኔ ልብ ግን አንቺን መረጠ"},
  {img:"a (29).jpg",  text:"ልቤ የተጠማውን ፍቅር ያለ ስስት ሰጠሽኝ"},
  {img:"a (19).png",  text:"እያንዳንዱ ካንቺ ጋር የማደርገው ነገር ልነቃ የማልፈልገው ህልም ይመስለኛል"},
  {img:"a (24).jpg",  text:"ስትስቂ ልደሰት ህይወት ሌላ ጣዕም ሰጠችኝ"},
  {img:"a (30).jpg",  text:"የልብ ንጽህናሽና አስተዋይነትሽ ካንቺ ውጪ እንዳላይ አርጎኝ አፈቀርኩሽ"},
  {img:"a (36).jpg",  text:"አንቺ ህይወቴን ብቻ አይደለም የቀየርሽው ህይወቴ ነው የሆንሽልኝ"},
  {img:"a (31).jpg",  text:"የኔ ፍቅር ድጋሚ የመምረጥ ዕድል ባገኝ በእያንዳንዱ እድሌ አንቺ ነበር የምመርጠው"},
  {img:"a (3).jpg",   text:"እሙዬ አንቺ ፍቅሬ ብቻ አይደለሽም ሰላሜም ጭምር ነሽ"},
  {img:"a (34).jpg",  text:"አንዳንድ ሰዎች ሙሉ ሕይወታቸውን የሚፈልጉትን ፍቅር ነው እኔ ካንቺ ያገኘሁት"},
  {img:"a (8).png",  text:"ፈገግታሽ ያይኔ ማረፊያ የልቤም ሐሴት ነው"},
  {img:"a (12).jpg",  text:"በህይወቴ ካረኳቸው ምርጡ ነገሮች ዋነኛው አንቺ ማፍቀሬ ነው"},
  {img:"a (1).jpg",   text:"አንቺ የመኖሬ ምክንያት የህይወቴ ተስፋ ነሽ"},
  {img:"a (16).jpg",  text:"ሁሉ ጊዜ አንቺ ከጎኔ ስላለሽ ነገ እኔን ምንም አያስፈራኝም"},
  {img:"a (35).jpg",  text:"ካንቺ ጋር ያደረኩን ትዝታዎቼ ለኔ የህይወቴ ወርቃማ ጊዜያት ናቸው"},
  {img:"a (18).jpg",  text:"ተራ ህይወቴ በፍቅርሽ አደመቅሽው"},
  {img:"a (26).jpg",  text:"ይሄ ፍቅር ብቻ አይደለም ከፍቅርም በላይ የሆነ በህይወት አንዴ የሚሰጥ በረከት ነው"},
  {img:"a (23).jpg",  text:"የኔ ሎጋ ቁመትሽን እኮ ከነ ሸፋፍነትሽ ስወደው😘😁"},
  {img:"a (22).jpg",  text:"እስቲ ፈገግ በይልኝ"},
  {img:"a (15).jpg",  text:"አዎ እንደሱ ለምን አትይኝም😁"},
  {img:"a (25).jpg",  text:"ምክንያቱም... እሙዬ"},
  {img:"a (9).jpg",   text:"የህይወቴ አጋር አንቺ የተወለድሽበት ቀን ነው🎂"},
  {img:"a (28).png",  text:"እንኳን ተወለድሽልኝ😘"},
  {img:"a (37).png",  text:"መልካም ልደት የኔ ፍቅር"},
];

let currentIndex = 0;
let typeTimer = null;
let noMoves = 0;
let mouseX = window.innerWidth/2, mouseY = window.innerHeight/2;
let cursorRingX = mouseX, cursorRingY = mouseY;
let heartsRunning = false;

/* CURSOR */
const cursorEl   = document.getElementById('cursor');
const cursorRing = document.getElementById('cursor-ring');
const trailColors = ['#ff2d78','#7b2fff','#00f5ff','#ffd700'];

document.addEventListener('mousemove', e => {
  mouseX = e.clientX; mouseY = e.clientY;
  cursorEl.style.left = mouseX + 'px';
  cursorEl.style.top  = mouseY + 'px';
  spawnTrail(mouseX, mouseY);
});
document.addEventListener('mousedown', () => {
  cursorEl.style.width = '8px'; cursorEl.style.height = '8px';
  cursorRing.style.width = '50px'; cursorRing.style.height = '50px';
  spawnClickRipple(mouseX, mouseY);
});
document.addEventListener('mouseup', () => {
  cursorEl.style.width = '14px'; cursorEl.style.height = '14px';
  cursorRing.style.width = '36px'; cursorRing.style.height = '36px';
});
(function animateCursorRing() {
  cursorRingX += (mouseX - cursorRingX) * 0.12;
  cursorRingY += (mouseY - cursorRingY) * 0.12;
  cursorRing.style.left = cursorRingX + 'px';
  cursorRing.style.top  = cursorRingY + 'px';
  requestAnimationFrame(animateCursorRing);
})();

let lastTrailTime = 0;
function spawnTrail(x, y) {
  const now = Date.now();
  if (now - lastTrailTime < 40) return;
  lastTrailTime = now;
  const t = document.createElement('div');
  t.className = 'cursor-trail';
  const c = trailColors[Math.floor(Math.random()*trailColors.length)];
  t.style.cssText = `left:${x}px;top:${y}px;background:${c};transform:translate(-50%,-50%);box-shadow:0 0 8px ${c};`;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 500);
}

function spawnClickRipple(x, y) {
  const r = document.createElement('div');
  r.style.cssText = `position:fixed;left:${x}px;top:${y}px;width:4px;height:4px;border-radius:50%;border:1.5px solid var(--pink);transform:translate(-50%,-50%);pointer-events:none;z-index:99997;animation:rippleOut 0.6s ease forwards;`;
  const s = document.createElement('style');
  s.textContent = `@keyframes rippleOut{to{width:80px;height:80px;opacity:0}}`;
  document.head.appendChild(s);
  document.body.appendChild(r);
  setTimeout(() => r.remove(), 700);
}

/* CANVAS */
const canvas = document.getElementById('universe');
const ctx = canvas.getContext('2d');
let W, H, stars = [];

function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
resize();
window.addEventListener('resize', resize);

function makeStars() {
  stars = [];
  const n = Math.floor((W * H) / 6000);
  for (let i = 0; i < n; i++) {
    stars.push({
      x: Math.random()*W, y: Math.random()*H,
      r: Math.random()*1.5+0.2,
      a: Math.random(), da: (Math.random()*0.012+0.003) * (Math.random()<0.5?1:-1),
      color: ['#ffffff','#ff2d78','#7b2fff','#00f5ff'][Math.floor(Math.random()*4)]
    });
  }
}
makeStars();

let shootX, shootY, shootProgress = -1;
function launchShooter() { shootX = Math.random()*W*0.6 + W*0.2; shootY = Math.random()*H*0.4; shootProgress = 0; }
setInterval(launchShooter, 3000);

let nebulaSeed = 0;
function drawUniverse() {
  ctx.clearRect(0,0,W,H);
  nebulaSeed += 0.003;
  const nx = W*0.5 + Math.sin(nebulaSeed)*W*0.1;
  const ny = H*0.5 + Math.cos(nebulaSeed*0.7)*H*0.1;
  const grad = ctx.createRadialGradient(nx, ny, 0, nx, ny, W*0.55);
  grad.addColorStop(0, 'rgba(255,45,120,0.07)');
  grad.addColorStop(0.4,'rgba(123,47,255,0.05)');
  grad.addColorStop(0.7,'rgba(0,245,255,0.03)');
  grad.addColorStop(1, 'transparent');
  ctx.fillStyle = grad; ctx.fillRect(0,0,W,H);

  for (const s of stars) {
    s.a += s.da;
    if (s.a > 1 || s.a < 0) s.da *= -1;
    ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI*2);
    ctx.fillStyle = s.color; ctx.globalAlpha = Math.max(0, Math.min(1, s.a)); ctx.fill();
  }
  ctx.globalAlpha = 1;

  if (shootProgress >= 0 && shootProgress <= 1) {
    const len = 180, angle = Math.PI/4;
    const ex = shootX - Math.cos(angle)*len*shootProgress;
    const ey = shootY + Math.sin(angle)*len*shootProgress;
    const sx = ex + Math.cos(angle)*len*0.3;
    const sy = ey - Math.sin(angle)*len*0.3;
    const sg = ctx.createLinearGradient(sx, sy, ex, ey);
    sg.addColorStop(0, 'transparent'); sg.addColorStop(1, 'rgba(255,255,255,0.95)');
    ctx.beginPath(); ctx.moveTo(sx, sy); ctx.lineTo(ex, ey);
    ctx.strokeStyle = sg; ctx.lineWidth = 2;
    ctx.shadowBlur = 12; ctx.shadowColor = 'white';
    ctx.stroke(); ctx.shadowBlur = 0; ctx.lineWidth = 1;
    shootProgress += 0.018;
    if (shootProgress > 1.2) shootProgress = -1;
  }

  const px = (mouseX/W - 0.5) * 24, py = (mouseY/H - 0.5) * 24;
  canvas.style.transform = `translate(${px}px,${py}px) scale(1.04)`;
  requestAnimationFrame(drawUniverse);
}
requestAnimationFrame(drawUniverse);

/* HEARTS */
function spawnHeart() {
  const h = document.createElement('div');
  h.className = 'heart-float';
  h.textContent = '\u2665';
  const sz = Math.random()*20+10, dur = Math.random()*5+5;
  h.style.cssText = `left:${Math.random()*100}vw;bottom:-40px;font-size:${sz}px;animation-duration:${dur}s;opacity:${Math.random()*0.6+0.4};color:${['#ff2d78','#ff6fad','#ff006e'][Math.floor(Math.random()*3)]};`;
  document.body.appendChild(h);
  setTimeout(() => h.remove(), dur*1000+300);
}
function startHearts() {
  if (heartsRunning) return;
  heartsRunning = true;
  setInterval(spawnHeart, 600);
}

/* FLASH */
function flash(color='#ffffff', dur=200) {
  const f = document.getElementById('flash');
  f.style.background = color; f.style.transition = 'none'; f.style.opacity = '0.35';
  setTimeout(() => { f.style.transition = `opacity ${dur}ms ease`; f.style.opacity = '0'; }, 20);
}

/* OPEN APP */
function openApp() {
  flash('#ff2d78', 300);
  const notif = document.getElementById('notif');
  const intro = document.getElementById('intro');
  const app   = document.getElementById('app');
  notif.style.transition = 'opacity 0.4s ease'; notif.style.opacity = '0';
  setTimeout(() => { notif.style.display = 'none'; }, 400);
  intro.style.display = 'flex';
  document.getElementById('music').play().catch(()=>{});
  setTimeout(() => {
    intro.style.transition = 'opacity 0.6s'; intro.style.opacity = '0';
    setTimeout(() => {
      intro.style.display = 'none';
      app.style.display = 'flex';
      showMemory(); startHearts();
    }, 700);
  }, 2800);
}

/* SHOW MEMORY */
function showMemory() {
  const m = memories[currentIndex];
  const ph  = document.getElementById('photo');
  const bg  = document.getElementById('photo-bg');
  const pw  = document.getElementById('polaroid-wrap');
  const total = memories.length;

  const tilt = (Math.random()-0.5)*8;
  pw.style.animation = 'none'; pw.offsetHeight;
  pw.style.animation = 'polaroidDrop 0.7s cubic-bezier(0.34,1.56,0.64,1) forwards';
  pw.style.transform = `rotate(${tilt}deg)`;

  ph.style.opacity = '0'; ph.style.transition = 'opacity 0.35s ease';
  setTimeout(() => {
    ph.src = m.img;
    const onLoad = () => { ph.style.opacity = '1'; };
    ph.onload = onLoad;
    if (ph.complete) onLoad();
  }, 250);

  bg.style.opacity = '0';
  setTimeout(() => { bg.style.backgroundImage = `url('${m.img}')`; bg.style.opacity = '1'; }, 400);

  document.getElementById('progress-num').textContent =
    String(currentIndex+1).padStart(2,'0') + ' / ' + String(total).padStart(2,'0');
  document.getElementById('progress-fill').style.width =
    ((currentIndex+1)/total*100) + '%';
  typeText(m.text);
}

/* TYPE */
function typeText(text) {
  if (typeTimer) clearTimeout(typeTimer);
  const el = document.getElementById('text');
  const blink = document.getElementById('cursor-blink');
  el.textContent = ''; el.appendChild(blink);
  let j = 0;
  function write() {
    if (j < text.length) {
      el.insertBefore(document.createTextNode(text[j]), blink);
      j++; typeTimer = setTimeout(write, 46);
    }
  }
  write();
}

/* NEXT */
function nextMemory() {
  flash('#ff2d78', 250);
  currentIndex++;
  if (currentIndex >= memories.length) {
    document.getElementById('polaroid-wrap').style.display = 'none';
    document.getElementById('text-wrap').style.display    = 'none';
    document.getElementById('progress-wrap').style.display = 'none';
    document.getElementById('nextBtn').style.display      = 'none';
    const fin = document.getElementById('final');
    fin.style.display = 'flex'; fin.style.animation = 'none';
    fin.offsetHeight; fin.style.animation = 'fadeUp 1s ease forwards';
  } else { showMemory(); }
}
   
function prevMemory() {
  if (currentIndex <= 0) return;

  flash('#00f5ff', 250); // nice different color for reverse
  currentIndex--;
  showMemory();

  // restore UI if user comes back from final screen
  document.getElementById('polaroid-wrap').style.display = 'block';
  document.getElementById('text-wrap').style.display = 'block';
  document.getElementById('progress-wrap').style.display = 'flex';
  document.getElementById('nextBtn').style.display = 'block';
  document.getElementById('final').style.display = 'none';
}

/* SPARKS */
function burstSparks(x, y, n, colors) {
  for (let i = 0; i < n; i++) {
    const sp = document.createElement('div');
    sp.className = 'spark-dot';
    const c = colors[Math.floor(Math.random()*colors.length)];
    const size = Math.random()*10+4;
    const angle = Math.random()*Math.PI*2;
    const dist = Math.random()*220+60;
    const tx = `translate(calc(-50% + ${Math.cos(angle)*dist}px), calc(-50% + ${Math.sin(angle)*dist}px)) scale(0)`;
    sp.style.cssText = `left:${x}px;top:${y}px;width:${size}px;height:${size}px;background:${c};box-shadow:0 0 ${size*2}px ${c};--tx:${tx};animation-delay:${Math.random()*0.3}s;animation-duration:${Math.random()*0.5+1}s;`;
    document.body.appendChild(sp);
    setTimeout(() => sp.remove(), 2000);
  }
}

function heartExplosion(cx, cy) {
  for (let i = 0; i < 50; i++) {
    const h = document.createElement('div');
    h.textContent = '\u2665';
    const size = Math.random()*24+8;
    h.style.cssText = `position:fixed;left:${cx}px;top:${cy}px;font-size:${size}px;pointer-events:none;z-index:8000;color:${['#ff2d78','#ff6fad','#ffd700','#ffffff'][Math.floor(Math.random()*4)]};transition:${1+Math.random()*0.8}s cubic-bezier(0.2,0.8,0.4,1);transform:translate(-50%,-50%);opacity:1;`;
    document.body.appendChild(h);
    requestAnimationFrame(() => requestAnimationFrame(() => {
      const ax = (Math.random()-0.5)*window.innerWidth*0.85;
      const ay = (Math.random()-0.5)*window.innerHeight*0.85;
      h.style.transform = `translate(calc(-50% + ${ax}px), calc(-50% + ${ay}px)) scale(0)`;
      h.style.opacity = '0';
    }));
    setTimeout(() => h.remove(), 2200);
  }
}

function yes() {
  flash('#ffd700', 400);
  const app = document.getElementById('app');
  const ys  = document.getElementById('yes-screen');
  app.style.transition = 'opacity 0.5s'; app.style.opacity = '0';
  setTimeout(() => { app.style.display = 'none'; ys.style.display = 'flex'; }, 500);
  const cx = window.innerWidth/2, cy = window.innerHeight/2;
  const cols = ['#ff2d78','#ffd700','#00f5ff','#7b2fff','#ffffff','#ff6fad'];
  burstSparks(cx, cy, 60, cols); heartExplosion(cx, cy);
  const doRepeat = () => {
    burstSparks(Math.random()*window.innerWidth, Math.random()*window.innerHeight, 20, cols);
    heartExplosion(cx + (Math.random()-0.5)*300, cy + (Math.random()-0.5)*200);
  };
  setTimeout(doRepeat, 1500); setTimeout(doRepeat, 3000); setTimeout(doRepeat, 4500);
  setInterval(() => { burstSparks(Math.random()*window.innerWidth, Math.random()*window.innerHeight, 12, cols); }, 1800);
}

function moveNoBtn(btn) {
  noMoves++;
  const scale = Math.max(0.3, 1 - noMoves*0.08);
  const opacity = Math.max(0.1, 1 - noMoves*0.1);
  const maxX = window.innerWidth * 0.35, maxY = window.innerHeight * 0.35;
  const x = (Math.random()-0.5)*2*maxX, y = (Math.random()-0.5)*2*maxY;
  const rot = (Math.random()-0.5)*30;
  btn.style.transform = `translate(${x}px,${y}px) rotate(${rot}deg) scale(${scale})`;
  btn.style.opacity = opacity;
  btn.style.fontSize = Math.max(0.4, 0.85-noMoves*0.04) + 'em';
  if (noMoves === 5) btn.textContent = 'never';
  if (noMoves === 8) btn.textContent = '...';
  if (noMoves >= 10) { btn.style.opacity = '0'; btn.style.pointerEvents = 'none'; }
}

document.addEventListener('touchmove', e => {
  mouseX = e.touches[0].clientX; mouseY = e.touches[0].clientY;
  cursorEl.style.left = mouseX + 'px'; cursorEl.style.top = mouseY + 'px';
}, {passive:true});
</script>
